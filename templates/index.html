<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI Clone</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0f3460">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI Clone">
<link rel="apple-touch-icon" href="/static/icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: #16213e;
        }

        .chat-header {
            padding: 15px 20px;
            background: #0f3460;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-header-left h1 {
            color: white;
            font-size: 1.1rem;
        }

        .chat-header-left p {
            color: #aaa;
            font-size: 0.75rem;
            margin-top: 2px;
        }

        .header-buttons {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            padding: 7px 12px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .clear-btn {
            background: transparent;
            color: #aaa;
            border: 1px solid #444;
        }

        .logout-btn {
            background: #e94560;
            color: white;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 11px 15px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user-message {
            background: #0f3460;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            background: #e94560;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .typing {
            background: #333;
            color: #aaa;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            font-style: italic;
        }

        .welcome-message {
            text-align: center;
            color: #666;
            margin: auto;
            padding: 20px;
        }

        .welcome-message h2 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: #e94560;
        }

        .chat-input-area {
            padding: 12px;
            background: #0f3460;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .chat-input-area textarea {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 20px;
            background: #16213e;
            color: white;
            font-size: 0.95rem;
            outline: none;
            resize: none;
            max-height: 120px;
            min-height: 45px;
            font-family: Arial, sans-serif;
            line-height: 1.4;
        }

        .chat-input-area textarea::placeholder {
            color: #555;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #c73652;
        }

        /* Mobile specific */
        @media (max-width: 600px) {
            .message {
                max-width: 90%;
                font-size: 0.9rem;
            }

            .chat-header-left h1 {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-header-left">
                <h1>🤖 My AI Clone</h1>
                <p>Your personal second brain</p>
            </div>
            <div class="header-buttons">
                <button class="header-btn clear-btn" onclick="clearChat()">Clear</button>
                <button class="header-btn logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <h2>Hello! I am your AI Clone 👋</h2>
                <p>Ask me anything — I think and talk just like you!</p>
            </div>
        </div>

        <div class="chat-input-area">
            <textarea 
                id="userInput" 
                placeholder="Type a message..." 
                rows="1"
                oninput="autoResize(this)"
                onkeypress="handleKeyPress(event)"
            ></textarea>
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function addMessage(content, isUser) {
            const welcome = document.querySelector('.welcome-message');
            if (welcome) welcome.remove();

            const div = document.createElement('div');
            div.classList.add('message');
            div.classList.add(isUser ? 'user-message' : 'ai-message');
            div.textContent = content;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.classList.add('message', 'typing');
            div.id = 'typingIndicator';
            div.textContent = '🤖 Thinking...';
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            userInput.value = '';
            userInput.style.height = 'auto';
            showTyping();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }

                const data = await response.json();
                hideTyping();

                if (data.reply) {
                    addMessage(data.reply, false);
                } else {
                    addMessage('❌ Something went wrong. Try again!', false);
                }
            } catch (error) {
                hideTyping();
                addMessage('❌ Connection error. Try again!', false);
            }
        }

        async function clearChat() {
            await fetch('/clear', { method: 'POST' });
            chatMessages.innerHTML = `
                <div class="welcome-message">
                    <h2>Chat cleared! 🧹</h2>
                    <p>Start a fresh conversation anytime.</p>
                </div>
            `;
        }

        function logout() {
            window.location.href = '/logout';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
    </script>
</body>
</html>
