<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #16213e;
        }

        .chat-header {
            padding: 20px;
            background: #0f3460;
            text-align: center;
            color: white;
        }

        .chat-header h1 {
            font-size: 1.5rem;
        }

        .chat-header p {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 4px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message {
            background: #0f3460;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            background: #e94560;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .typing {
            background: #333;
            color: #aaa;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            font-style: italic;
        }

        .chat-input-area {
            padding: 15px;
            background: #0f3460;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 25px;
            background: #16213e;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }

        .chat-input-area input::placeholder {
            color: #666;
        }

        .send-btn {
            padding: 12px 20px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #c73652;
        }

        .clear-btn {
            padding: 8px 14px;
            background: transparent;
            color: #aaa;
            border: 1px solid #aaa;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: #aaa;
            color: #333;
        }

        .welcome-message {
            text-align: center;
            color: #666;
            margin: auto;
            padding: 20px;
        }

        .welcome-message h2 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: #e94560;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 My AI Clone</h1>
            <p>Your personal second brain — always ready</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <h2>Hello! I am your AI Clone 👋</h2>
                <p>Ask me anything — I think and talk just like you!</p>
            </div>
        </div>

        <div class="chat-input-area">
            <button class="clear-btn" onclick="clearChat()">Clear</button>
            <input 
                type="text" 
                id="userInput" 
                placeholder="Type a message..." 
                onkeypress="handleKeyPress(event)"
            />
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');

        function addMessage(content, isUser) {
            // Remove welcome message if exists
            const welcome = document.querySelector('.welcome-message');
            if (welcome) welcome.remove();

            const div = document.createElement('div');
            div.classList.add('message');
            div.classList.add(isUser ? 'user-message' : 'ai-message');
            div.textContent = content;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.classList.add('message', 'typing');
            div.id = 'typingIndicator';
            div.textContent = '🤖 Thinking...';
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            userInput.value = '';
            showTyping();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();
                hideTyping();

                if (data.reply) {
                    addMessage(data.reply, false);
                } else {
                    addMessage('❌ Something went wrong. Try again!', false);
                }
            } catch (error) {
                hideTyping();
                addMessage('❌ Connection error. Try again!', false);
            }
        }

        async function clearChat() {
            await fetch('/clear', { method: 'POST' });
            chatMessages.innerHTML = `
                <div class="welcome-message">
                    <h2>Chat cleared! 🧹</h2>
                    <p>Start a fresh conversation anytime.</p>
                </div>
            `;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
