<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — My AI Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background: #16213e;
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .login-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        h1 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .error {
            background: #e9455f22;
            border: 1px solid #e94560;
            color: #e94560;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px 18px;
            background: #0f3460;
            border: 2px solid transparent;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            margin-bottom: 15px;
            transition: border 0.2s;
        }

        input[type="password"]:focus {
            border-color: #e94560;
        }

        input[type="password"]::placeholder {
            color: #555;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #c73652;
        }

        .footer-text {
            margin-top: 20px;
            color: #444;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-icon">🤖</div>
        <h1>My AI Clone</h1>
        <p>Enter your password to access your personal AI</p>

        {% if error %}
        <div class="error">❌ {{ error }}</div>
        {% endif %}

        <form method="POST">
            <input 
                type="password" 
                name="password" 
                placeholder="Enter your password"
                autofocus
            />
            <button type="submit">Access My AI Clone 🔐</button>
        </form>

        <p class="footer-text">Private & Personal — Only for you</p>
    </div>
</body>
</html>
